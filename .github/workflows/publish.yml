name: Publish to npm

# Publishes the package to npm with provenance whenever a GitHub Release is
# published. Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret needed.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm provenance / trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # NOTE: do NOT set registry-url here — it writes an empty _authToken to
      # .npmrc which breaks npm Trusted Publishing (OIDC). npm defaults to the
      # public registry and authenticates via OIDC.
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Trusted Publishing requires npm >= 11.5.1
      - run: npm install -g npm@latest

      - run: npm ci
      - run: npm run build
      - run: npm run lint

      - run: npm publish --provenance --access public
